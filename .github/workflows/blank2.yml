name: 8
env:
  THIS_WF: ${{github.workflow}}
on:
  workflow_dispatch:
    inputs:
      cascade:
        type: boolean
        default: false
        required: false
      f_cmdline:
        type: string
        required: false
      s_cmdline:
        type: string
        required: false
jobs:
  build:
    runs-on: windows-latest
    steps:
      # - uses: actions/checkout@v6
      - name: Prepare
        shell: cmd
        run: |
          winget install Cloudflare.Warp --accept-source-agreements --accept-package-agreements --disable-interactivity --silent
          set "PATH=%PATH%;C:\Program Files\Cloudflare\Cloudflare WARP"
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          curl -fsL -o "tooling.7z" ^
            -H "Accept: application/octet-stream" ^
            -H "Authorization: Bearer ${{secrets.MY_TOKEN}}" ^
            -H "X-GitHub-Api-Version: 2026-03-10" ^
            ${{secrets.TOOLING}}
          if %errorlevel% neq 0 (
            echo %THIS_WF% failed| curl -s -x socks5://127.0.0.1:40000 -m 1 ${{secrets.NOTIFY}}
            exit 1
          )
          7z e -bso0 -p${{secrets.SECRET_P}} tooling.7z
          del tooling.7z
          warp-cli status
          curl -s -m 10 -x socks5://127.0.0.1:40000 https://ifconfig.co
          mkdir download
          curl -fkL -o "%THIS_WF%.7z" --output-dir download -x socks5://127.0.0.1:40000 ${{secrets.SOURCE}}/Worker/%THIS_WF%.7z
          if %errorlevel% neq 0 (
            echo %THIS_WF% failed| curl -s -x socks5://127.0.0.1:40000 -m 1 ${{secrets.NOTIFY}}
            exit 1 
          )
          warp-cli --accept-tos disconnect
          7z e -bso0 -p${{secrets.SECRET_P}} -oinput .\download\*
          rmdir download /S /Q 
      - name: Test
        shell: cmd
        run: |
          mkdir result
          for %%f in (input\*) do (
          	kekw.exe -hide_banner -loglevel error -i "%%f" -map 0:v:0 -pix_fmt yuv420p -f yuv4mpegpipe ${{inputs.f_cmdline}} - | lolw.exe -i stdin --lookahead 120 --progress 2 -b "result\%%~nf.ivf" --lp 3 --preset 3 --keyint 10s --tune 0 ${{inputs.s_cmdline}}
            del "%%f"
          )
          set "PATH=%PATH%;C:\Program Files\Cloudflare\Cloudflare WARP"
          warp-cli --accept-tos connect
          7z a -bso0 -sdel -mx0 -mhe -p${{secrets.SECRET_P}} release%THIS_WF%.7z .\result\*
          rmdir result /S /Q
      - name: Finish
        uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          repo_token: "${{secrets.GITHUB_TOKEN}}"
          automatic_release_tag: latest
          draft: true
          files: release${{env.THIS_WF}}.7z
      - name: Notify
        shell: cmd
        run: |
          echo %THIS_WF% finished| curl -s -x socks5://127.0.0.1:40000 -m 1 ${{secrets.NOTIFY}}
          exit 0
